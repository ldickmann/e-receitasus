plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode")
if (flutterVersionCode == null) {
    flutterVersionCode = "1"
}

def flutterVersionName = localProperties.getProperty("flutter.versionName")
if (flutterVersionName == null) {
    flutterVersionName = "1.0"
}

// Carrega as credenciais de assinatura do arquivo key.properties (não versionado)
def keyProperties = new Properties()
def keyPropertiesFile = rootProject.file("key.properties")
if (keyPropertiesFile.exists()) {
    keyPropertiesFile.withReader("UTF-8") { reader ->
        keyProperties.load(reader)
    }
}

android {
    namespace = "br.com.e_receitasus"
    // Fixado explicitamente em 35: supabase_flutter e flutter_secure_storage puxam
    // dependências AndroidX transitivas que exigem compileSdk >= 35. Delegar a
    // flutter.compileSdkVersion pode resolver para 34 no CI e causar falha em
    // :app:checkReleaseAarMetadata com Flutter 3.41+.
    compileSdk = 35
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    // Define a configuração de assinatura para o build de release
    signingConfigs {
        release {
            keyAlias        keyProperties["keyAlias"]
            keyPassword     keyProperties["keyPassword"]
            storeFile       keyProperties["storeFile"] ? file(keyProperties["storeFile"]) : null
            storePassword   keyProperties["storePassword"]
        }
    }

    defaultConfig {
        applicationId = "br.com.e_receitasus"
        // flutter_secure_storage 9.x usa EncryptedSharedPreferences (Android Keystore),
        // que exige minSdk 23. Sobrescrevemos o default do Flutter (21) para evitar
        // falha em :app:checkReleaseAarMetadata durante o build de release.
        minSdk = 23
        // Alinhado com compileSdk = 35 para evitar warnings de API e
        // garantir consistência com as dependências transitivas do supabase_flutter.
        targetSdk = 35
        versionCode = flutterVersionCode.toInteger()
        versionName = flutterVersionName
    }

    buildTypes {
        release {
            // Usa as chaves oficiais de release (substitui o debug anterior)
            signingConfig = signingConfigs.release
        }
    }
}

flutter {
    source = "../.."
}