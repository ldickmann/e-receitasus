# ============================================================
# PIPELINE CD — E-ReceitaSUS
# ============================================================
# Disparado automaticamente após a conclusão bem-sucedida
# do pipeline de CI ("E-ReceitaSUS CI") na branch 'develop'.
#
# PREMISSA DE SEGURANÇA:
# O CD só avança se todos os testes (backend + frontend) passaram.
# Isso garante que nenhum commit com falha nos testes cause
# uma sincronização indevida no banco de produção ou deploy
# de funções com código quebrado.
#
# JOBS (executados em sequência):
#   1. setup-environment  → Valida o ambiente (Node + Supabase CLI)
#   2. sync-database      → Sincroniza o schema Prisma no banco
#   3. deploy-functions   → Faz deploy das Edge Functions Supabase
#
# ─────────────────────────────────────────────────────────────
# SECRETS NECESSÁRIOS NO REPOSITÓRIO
# (Settings → Secrets and variables → Actions):
#
#   DATABASE_URL          → Connection string direta Supabase (porta 5432, sem pgbouncer)
#                           Ex: postgresql://postgres.[ref]:[password]@aws-0-[region].pooler.supabase.com:5432/postgres
#   SUPABASE_ACCESS_TOKEN → Token pessoal do Supabase
#                           (gerado em supabase.com/dashboard/account/tokens)
#   SUPABASE_PROJECT_ID   → Project ref do Supabase (ex: pofzorepizdcefvodwln)
#
# NOTA: SUPABASE_JWT_SECRET NÃO é necessário neste pipeline.
# O backend valida tokens via JWKS remoto (RS256 assimétrico),
# derivando o endpoint público a partir de SUPABASE_URL em runtime.
# Nenhuma chave secreta é necessária para esse fluxo de validação.
# ─────────────────────────────────────────────────────────────
# ============================================================
name: E-ReceitaSUS CD

# ─────────────────────────────────────────────────────────────
# TRIGGER: workflow_run
# Este pipeline é disparado SOMENTE quando o CI ("E-ReceitaSUS CI")
# conclui na branch 'develop'. O filtro 'branches' se refere ao
# branch que originou o CI — portanto só afeta pushes diretos
# à 'develop', nunca Pull Requests de outras branches.
#
# IMPORTANTE: o valor em 'workflows' deve ser idêntico ao campo
# 'name:' definido em ci.yml para que o GitHub localize
# o workflow correto.
# ─────────────────────────────────────────────────────────────
on:
  workflow_run:
    workflows: ["E-ReceitaSUS CI"]
    types: [completed]
    branches: [develop]

# ─────────────────────────────────────────────────────────────
# VARIÁVEIS DE AMBIENTE GLOBAIS DO PIPELINE
# FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: antecipa a migração obrigatória
# para Node.js 24 (obrigatória a partir de junho de 2026 pelo GitHub).
# Garante compatibilidade futura das actions: checkout, setup-node
# e supabase/setup-cli sem necessidade de atualizar versões manualmente.
# Ref: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
# ─────────────────────────────────────────────────────────────
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: CONFIGURAR AMBIENTE
  # Responsabilidade: validar que o CI passou e instalar as
  # ferramentas necessárias (Node.js e Supabase CLI).
  #
  # GUARDA DE QUALIDADE:
  # O campo 'if' verifica github.event.workflow_run.conclusion.
  # Se o CI falhou (conclusion != 'success'), este job é ignorado
  # e, por consequência, todos os jobs subsequentes também são
  # ignorados automaticamente via propagação do 'needs' em cadeia.
  # ─────────────────────────────────────────────────────────────
  setup-environment:
    name: Configurar Ambiente
    runs-on: ubuntu-latest
    # Guarda principal do CD: só avança se o CI concluiu com êxito.
    # Conclusões possíveis: success | failure | cancelled | timed_out
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      # Faz o download do código-fonte do commit exato que passou no CI.
      # ATENÇÃO: em workflow_run, github.sha aponta para o HEAD da branch
      # padrão do repositório (ex: main), NÃO para o commit que disparou o CI.
      # É obrigatório usar github.event.workflow_run.head_sha para garantir
      # que o CD opera sobre o mesmo código que foi testado pelo CI.
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # Node 22 LTS: versão estável com suporte ativo,
      # evita avisos de depreciação das versões anteriores
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Instala o Supabase CLI via action oficial do próprio Supabase.
      # Mais confiável que instalar via npm ou curl manualmente.
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: "latest"

      # Valida que a instalação do CLI foi bem-sucedida.
      # Se este step falhar, os jobs seguintes não executam.
      - name: Verificar Instalação do Supabase CLI
        run: supabase --version

      # Confirma que o CLI responde a comandos sem precisar
      # de credenciais — valida a integridade do binário
      - name: Verificar Funcionamento do CLI
        run: supabase --help

  # ─────────────────────────────────────────────────────────────
  # JOB 2: SINCRONIZAR BANCO DE DADOS (PRISMA)
  # Responsabilidade: aplicar as mudanças do schema.prisma
  # diretamente no banco de dados do Supabase.
  #
  # IMPORTANTE: usa 'prisma db push' com a DIRECT_URL (porta 5432)
  # pois o PgBouncer (porta 6543, ?pgbouncer=true) não suporta
  # o protocolo de query estendido exigido pelo Prisma.
  # ─────────────────────────────────────────────────────────────
  sync-database:
    name: Sincronizar Banco de Dados (Prisma)
    runs-on: ubuntu-latest
    # Depende do Job 1 — só avança se o ambiente foi validado.
    # Se setup-environment foi ignorado (CI falhou), este job
    # também é ignorado automaticamente pela propagação do 'needs'.
    needs: setup-environment

    steps:
      # Mesmo ref do job anterior — garante consistência entre jobs do CD.
      # Cada job cria um novo runner, por isso o checkout precisa ser repetido.
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          # Cache baseado no package-lock.json: evita redownload de
          # módulos entre execuções, reduzindo o tempo de instalação.
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      # npm ci instala exatamente as versões fixadas no package-lock.json.
      # Mais determinístico que 'npm install': garante que produção usa
      # as mesmas versões de dependências validadas pelo CI.
      - name: Instalar Dependências do Backend
        run: npm ci
        working-directory: ./backend

      # Gera o Prisma Client tipado a partir do schema.prisma.
      # Necessário antes de executar qualquer comando Prisma que
      # acesse o banco, pois o Client é gerado localmente.
      - name: Gerar Prisma Client
        run: npx prisma generate
        working-directory: ./backend
        env:
          # DATABASE_URL aqui deve ser a DIRECT_URL (porta 5432, sem pgbouncer)
          # Valor configurado em: Settings → Secrets and variables → Actions
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # Aplica SOMENTE as migrations pendentes no banco de produção.
      # Diferente do 'db push', o 'migrate deploy' nunca remove colunas
      # ou enums existentes — ele apenas avança o histórico de migrations,
      # tornando o pipeline seguro mesmo com commits desatualizados no runner.
      # Referência: https://www.prisma.io/docs/orm/prisma-migrate/workflows/deploying-migrations
      - name: Aplicar Migrations Pendentes (migrate deploy)
        run: npx prisma migrate deploy
        working-directory: ./backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ─────────────────────────────────────────────────────────────
  # JOB 3: DEPLOY DAS EDGE FUNCTIONS (SUPABASE)
  # Responsabilidade: publicar as Edge Functions (Deno) do diretório
  # supabase/functions/ para o projeto Supabase em produção.
  #
  # SEGURANÇA: usa SUPABASE_ACCESS_TOKEN (token pessoal) e
  # SUPABASE_PROJECT_ID (ref do projeto) via GitHub Secrets —
  # nenhuma credencial é exposta no código-fonte.
  #
  # RESILIÊNCIA: verifica a existência da pasta supabase/functions/
  # antes de tentar o deploy. Se não existir, o step é ignorado
  # sem quebrar o pipeline — útil enquanto funções não foram criadas.
  # ─────────────────────────────────────────────────────────────
  deploy-functions:
    name: Deploy Edge Functions (Supabase)
    runs-on: ubuntu-latest
    # Depende do Job 2 — deploy só ocorre após o banco estar atualizado.
    # Se sync-database foi ignorado, este job também é ignorado.
    needs: sync-database

    steps:
      # Mesmo ref dos jobs anteriores — deploy usa os mesmos arquivos
      # que passaram no CI e foram sincronizados no banco.
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # CLI do Supabase é necessário para o comando 'functions deploy'
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: "latest"

      # Verifica se a pasta de functions existe no repositório.
      # O resultado é gravado em $GITHUB_OUTPUT para ser lido
      # pelos steps seguintes via 'steps.check-functions.outputs.has_functions'.
      - name: Verificar Existência de Edge Functions
        id: check-functions
        run: |
          if [ -d "supabase/functions" ]; then
            echo "has_functions=true" >> $GITHUB_OUTPUT
          else
            echo "has_functions=false" >> $GITHUB_OUTPUT
            echo "Nenhuma Edge Function encontrada. Etapa de deploy ignorada."
          fi

      # Vincula o Supabase CLI ao projeto remoto via Project Ref.
      # Necessário antes de qualquer operação remota (deploy, migrations, etc.).
      # Só executa se a pasta supabase/functions/ existir.
      - name: Linkar Projeto Supabase
        if: steps.check-functions.outputs.has_functions == 'true'
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          # Token de acesso pessoal do Supabase (gerado em supabase.com/dashboard/account/tokens)
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # Publica todas as funções dentro de supabase/functions/ de uma vez.
      # Cada subpasta é tratada como uma função independente pelo CLI.
      # Só executa se a pasta supabase/functions/ existir.
      - name: Deploy de Todas as Edge Functions
        if: steps.check-functions.outputs.has_functions == 'true'
        run: supabase functions deploy
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
