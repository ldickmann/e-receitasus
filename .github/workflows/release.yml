# ============================================================
# PIPELINE RELEASE — E-ReceitaSUS
# ============================================================
# Responsabilidade: Build do APK Android assinado e publicação
# automática como asset de uma GitHub Release.
#
# TRIGGER: push de tag no padrão v*.*.* (ex: v1.0.0)
#   git tag v1.0.0 && git push origin v1.0.0
#
# SECRETS NECESSÁRIOS (Settings → Secrets → Actions):
#   KEYSTORE_BASE64   → Keystore .jks codificado em base64
#   KEY_ALIAS         → Alias da chave (ex: ereceitasus)
#   STORE_PASSWORD    → Senha do keystore
#   KEY_PASSWORD      → Senha da chave privada
# ============================================================
name: E-ReceitaSUS Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    name: Build APK e Publicar Release
    runs-on: ubuntu-latest

    # Permite que o GITHUB_TOKEN crie/atualize releases e faça upload de assets.
    # Sem 'contents: write' a action softprops/action-gh-release falha com 403
    # ("Resource not accessible by integration") ao tentar criar a release.
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses:
          actions/checkout@v4

          # Java 17 é obrigatório para Android Gradle Plugin 8.x
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

        # Instala o Flutter SDK na versão estável
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      # Instala as dependências do projeto Flutter
      - name: Instalar Dependências Flutter
        run: flutter pub get
        working-directory: ./frontend

      # Recria o key.properties a partir dos secrets — nunca
      # versionado no repositório por conter credenciais sensíveis.
      # IMPORTANTE: passamos os secrets via env: e usamos printf com %s
      # para evitar expansão shell de caracteres como $ na senha
      # (ex: "$19" seria interpretado como variável posicional pelo bash,
      # corrompendo a senha gravada no arquivo).
      - name: Criar key.properties a partir dos Secrets
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          {
            printf 'keyAlias=%s\n' "$KEY_ALIAS"
            printf 'keyPassword=%s\n' "$KEY_PASSWORD"
            printf 'storePassword=%s\n' "$STORE_PASSWORD"
            printf 'storeFile=%s\n' "keystore.jks"
          } > frontend/android/key.properties

      # Decodifica o keystore (armazenado em base64 no secret)
      # e o salva em android/app/ — Gradle resolve file() em signingConfigs
      # relativo ao módulo app, não ao rootProject. Salvar um nível acima
      # causa "Keystore file not found" mesmo com storeFile=keystore.jks.
      - name: Decodificar Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > frontend/android/app/keystore.jks

      # Gera o APK release assinado com as credenciais do keystore
      - name: Build APK Release
        run: flutter build apk --release
        working-directory: ./frontend

      # Extrai o nome da tag (ex: v1.0.0) para usar no nome da Release
      - name: Extrair Versão da Tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      # Renomeia o APK incluindo a versão para rastreabilidade
      - name: Renomear APK com Versão
        run: |
          mv frontend/build/app/outputs/flutter-apk/app-release.apk \
             frontend/build/app/outputs/flutter-apk/e-receitasus-${{ steps.version.outputs.VERSION }}.apk

      # Cria a GitHub Release e faz upload do APK como asset
      - name: Criar GitHub Release e Upload do APK
        uses: softprops/action-gh-release@v2
        with:
          name: "E-ReceitaSUS ${{ steps.version.outputs.VERSION }}"
          generate_release_notes: true
          files: frontend/build/app/outputs/flutter-apk/e-receitasus-${{ steps.version.outputs.VERSION }}.apk
